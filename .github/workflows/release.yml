name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish CLI
        run: dotnet publish src/Qmd.Cli/Qmd.Cli.csproj --configuration Release --runtime win-x64 --self-contained --output ./publish /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack NuGet
        run: dotnet pack src/Qmd.Sdk/Qmd.Sdk.csproj --configuration Release --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Remove non-Windows runtimes
        run: |
          Get-ChildItem ./publish/runtimes -Directory -Filter 'linux-*' | Remove-Item -Recurse -Force
          Get-ChildItem ./publish/runtimes -Directory -Filter 'osx-*' | Remove-Item -Recurse -Force
          Get-ChildItem ./publish/runtimes -Directory -Filter 'maccatalyst-*' | Remove-Item -Recurse -Force
          Get-ChildItem ./publish/runtimes -Directory -Filter 'browser*' | Remove-Item -Recurse -Force
        shell: pwsh

      - name: Create archive
        run: Compress-Archive -Path ./publish/* -DestinationPath ./qmd-win-x64.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: qmd-win-x64.zip
          generate_release_notes: true

      - name: Push to NuGet
        shell: bash
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
